<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop') no-repeat center center/cover;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(3px);
}

.register-box{
    position:relative;
    width:380px;
    padding:45px 35px;
    border-radius:22px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.18);
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
    color:white;
}

.register-box h1{
    text-align:center;
    margin-bottom:35px;
    font-size:38px;
    font-weight:700;
}

.input-box{
    margin-bottom:25px;
}

.input-box input{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:2px solid rgba(255,255,255,0.7);
    padding:12px 5px;
    color:white;
    font-size:15px;
    outline:none;
}

.input-box input::placeholder{
    color:rgba(255,255,255,0.75);
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    margin-bottom:28px;
}

.options a{
    color:white;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

.register-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:40px;
    background:white;
    color:#111;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.register-btn:hover{
    transform:scale(1.03);
    background:#f1f1f1;
}

.bottom-text{
    margin-top:22px;
    text-align:center;
    font-size:14px;
}

.bottom-text a{
    color:white;
    font-weight:600;
    text-decoration:none;
}

.bottom-text a:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<div class="register-box">

    <h1>Register</h1>

    <form method="POST">

        <div class="input-box">
            <input type="text" name="name" placeholder="Full Name" required>
        </div>

        <div class="input-box">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <div class="options">
            <label>
                <input type="checkbox">
                Remember me
            </label>

            <a href="#">Forgot Password</a>
        </div>

        <button type="submit" class="register-btn">
            Register
        </button>

    </form>

    <div class="bottom-text">
        Already have an account?
        <a href="/login">Login</a>
    </div>

</div>

</body>
</html>
