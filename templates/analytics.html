<!DOCTYPE html>
<html>
<head>
<title>Analytics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Smart Campus Analytics</h2>

<canvas id="roomChart" width="400" height="200"></canvas>

<canvas id="facultyChart" width="400" height="200"></canvas>

<h3>Smart Suggestions</h3>
{% for a in alerts %}
<p style="color:red">{{a}}</p>
{% endfor %}

<script>

const room_name = {{ room_name | tojson }};
const faculty = {{ faculty | tojson }};

new Chart(document.getElementById("roomChart"),{
type:'bar',
data:{
labels: rooms.map(r=>r.name),
datasets:[{
label:'Room Utilization %',
data: rooms.map(r=>r.util)
}]
}
});

new Chart(document.getElementById("facultyChart"),{
type:'bar',
data:{
labels: faculty.map(f=>f.name),
datasets:[{
label:'Faculty Workload %',
data: faculty.map(f=>f.load)
}]
}
});

</script>

</body>
</html>
